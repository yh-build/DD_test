<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>DroneDocking · 고급 변형 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #eaf3f9;
      --muted: #9fb8c8;
      --cyan: #3ec8e6;
      --line: rgba(255, 255, 255, 0.12);
      --ease: cubic-bezier(0.32, 0.72, 0, 1);
    }
    * { box-sizing: border-box; }
    html { overflow-x: hidden; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      font-family: "Plus Jakarta Sans", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(55% 45% at 18% 12%, rgba(62, 200, 230, 0.20), transparent 60%),
        radial-gradient(50% 45% at 86% 22%, rgba(33, 99, 150, 0.34), transparent 60%),
        radial-gradient(60% 55% at 75% 95%, rgba(20, 150, 170, 0.16), transparent 60%),
        #061a2e;
      display: grid;
      place-items: center;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    /* 해저 등고선 오버레이 */
    .contour {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.10;
    }

    .stage { position: relative; z-index: 2; width: min(440px, 100%); }

    /* 더블 베젤 글래스 카드 */
    .shell {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: 9px;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 44px 90px rgba(0, 0, 0, 0.5);
    }
    .core {
      background: rgba(7, 27, 46, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 40px 34px 34px;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.12);
    }

    .brand { display: flex; align-items: center; gap: 11px; margin-bottom: 26px; }
    .mark {
      width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center;
      font-weight: 800; color: #06202f;
      background: linear-gradient(150deg, #5fd6ef, #1f8fbf);
      box-shadow: 0 8px 20px rgba(62, 200, 230, 0.35);
    }
    .brand b { font-weight: 800; letter-spacing: -0.01em; }
    .brand small { display: block; color: var(--muted); font-size: 12px; font-weight: 600; }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px;
      font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase;
      color: #bfe6f2; font-weight: 700; margin-bottom: 16px;
    }
    .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

    h1 {
      margin: 0 0 10px; font-size: clamp(27px, 6vw, 36px); line-height: 1.08;
      letter-spacing: -0.025em; font-weight: 800;
    }
    h1 .grad { background: linear-gradient(100deg, #9fe9fb, #3ec8e6 60%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .lead { margin: 0 0 28px; color: var(--muted); font-size: 14.5px; line-height: 1.6; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: #c4d6e2; margin-bottom: 7px; letter-spacing: 0.01em; }
    .f-input {
      width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--line);
      border-radius: 14px; padding: 14px 16px; color: var(--ink); font: inherit; font-size: 14.5px;
      transition: border-color .3s var(--ease), box-shadow .3s var(--ease), background .3s var(--ease);
    }
    .f-input::placeholder { color: #6f8a9c; }
    .f-input:focus {
      outline: none; border-color: rgba(62, 200, 230, 0.6);
      box-shadow: 0 0 0 4px rgba(62, 200, 230, 0.16); background: rgba(255, 255, 255, 0.07);
    }

    .cta {
      width: 100%; margin-top: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
      background: #ffffff; color: #062236; border: none; border-radius: 999px;
      padding: 6px 6px 6px 22px; font: inherit; font-weight: 800; font-size: 15px; cursor: pointer;
      transition: transform .4s var(--ease), box-shadow .4s var(--ease);
    }
    .cta:hover { box-shadow: 0 16px 34px rgba(62, 200, 230, 0.28); }
    .cta:active { transform: scale(0.985); }
    .cta .arrow {
      width: 42px; height: 42px; border-radius: 999px; background: #062236; color: #fff;
      display: grid; place-items: center; flex-shrink: 0; transition: transform .4s var(--ease);
    }
    .cta:hover .arrow { transform: translateX(3px); }

    .alt { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--line); font-size: 13px; }
    .alt a { color: #bfe6f2; font-weight: 700; text-decoration: none; cursor: pointer; }
    .alt a:hover { color: #fff; }

    /* 떠 있는 도메인 칩 (시그니처) */
    .chip {
      position: absolute; z-index: 3; display: flex; align-items: center; gap: 9px;
      background: rgba(255, 255, 255, 0.07); border: 1px solid var(--line); border-radius: 16px;
      padding: 11px 14px; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }
    .chip b { font-size: 15px; font-weight: 800; }
    .chip span { color: var(--muted); font-size: 11px; font-weight: 600; }
    .chip .ic { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center; background: rgba(62, 200, 230, 0.16); color: var(--cyan); }
    .chip.a { top: -22px; right: -34px; }
    .chip.b { bottom: 28px; left: -52px; }

    .note { position: fixed; bottom: 14px; left: 0; right: 0; text-align: center; z-index: 2; color: rgba(255,255,255,.4); font-size: 11px; }

    /* 스태거 등장 */
    @keyframes rise { from { opacity: 0; transform: translateY(18px); filter: blur(6px); } to { opacity: 1; transform: none; filter: none; } }
    .rise { animation: rise .85s var(--ease) both; }
    .d1 { animation-delay: .05s; } .d2 { animation-delay: .12s; } .d3 { animation-delay: .2s; }
    .d4 { animation-delay: .28s; } .d5 { animation-delay: .36s; } .d6 { animation-delay: .44s; }
    .chip { animation: rise 1s var(--ease) both; }
    .chip.a { animation-delay: .5s; } .chip.b { animation-delay: .62s; }

    @media (max-width: 560px) { .chip { display: none; } }
    @media (prefers-reduced-motion: reduce) {
      .rise, .chip { animation: none; }
      * { transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <!-- 해저 등고선 -->
  <svg class="contour" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" fill="none" stroke="#9fe9fb" stroke-width="1.2">
    <path d="M-50,230 C300,170 600,300 900,230 C1150,170 1350,260 1500,210"/>
    <path d="M-50,330 C300,270 600,400 900,330 C1150,270 1350,360 1500,310"/>
    <path d="M-50,440 C320,380 620,510 920,440 C1170,380 1360,470 1500,420"/>
    <path d="M-50,560 C320,500 620,630 920,560 C1170,500 1360,590 1500,540"/>
    <path d="M-50,690 C320,630 620,760 920,690 C1170,630 1360,720 1500,670"/>
  </svg>

  <div class="stage">
    <div class="chip a"><span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg></span><div><b>5cm</b><span>정합 정확도</span></div></div>
    <div class="chip b"><span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></svg></span><div><b>3초</b><span>실시간 지연</span></div></div>

    <div class="shell rise d1">
      <div class="core">
        <div class="brand rise d2">
          <div class="mark">DD</div>
          <div><b>DroneDocking</b><small>(주)미래해양 · 연안 측량 SaaS</small></div>
        </div>

        <span class="eyebrow rise d2"><span class="dot"></span>Coastal Monitoring</span>
        <h1 class="rise d3">현장에서 바로<br /><span class="grad">정확도를 판정</span>합니다</h1>
        <p class="lead rise d3">드론 영상과 GCP를 실시간 정합해 5cm·3초 기준을 현장에서 즉시 확인하세요.</p>

        <div class="field rise d4">
          <label>아이디</label>
          <input class="f-input" type="email" placeholder="name@miraeocean.com" value="admin01@miraeocean.com" />
        </div>
        <div class="field rise d4">
          <label>비밀번호</label>
          <input class="f-input" type="password" placeholder="비밀번호" value="••••••••••" />
        </div>

        <button class="cta rise d5" onclick="this.querySelector('.t').textContent='로그인 중…'">
          <span class="t">로그인</span>
          <span class="arrow"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
        </button>

        <div class="alt rise d6">
          <a onclick="alert('회사 코드로 가입 요청 — 관리자 승인 후 사용')">회사 코드로 가입</a>
          <a onclick="alert('비밀번호 재설정 링크 발송')">비밀번호 찾기</a>
        </div>
      </div>
    </div>
  </div>

  <div class="note">고급(High-End) 디자인 방향 비교용 변형본 · 정적 목업</div>
</body>
</html>
