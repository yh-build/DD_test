<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>DroneDocking SaaS 목업</title>
  <style>
    :root{
      --bg:#f6f8fa; --panel:#fff; --text:#1f2328; --muted:#66707a;
      --line:#d8dee4; --primary:#0f766e; --primary-soft:#e8f6f4;
      --shadow:0 12px 28px rgba(31,35,40,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);
      font-family:"Segoe UI","Noto Sans KR",Arial,sans-serif;line-height:1.5;
      display:grid;place-items:center;padding:24px}
    .wrap{width:min(560px,100%)}
    .head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
    .mark{width:44px;height:44px;border-radius:10px;display:grid;place-items:center;
      background:var(--primary);color:#fff;font-weight:900;font-size:18px}
    h1{margin:0;font-size:24px}
    .sub{margin:2px 0 22px;color:var(--muted);font-size:14px}
    .card{display:flex;align-items:center;gap:14px;background:var(--panel);
      border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);
      padding:18px;margin-bottom:12px;text-decoration:none;color:inherit}
    .card:active{transform:translateY(1px)}
    .ico{width:46px;height:46px;border-radius:10px;display:grid;place-items:center;
      background:var(--primary-soft);color:var(--primary);flex-shrink:0}
    .ico svg{width:24px;height:24px}
    .card b{display:block;font-size:16px}
    .card span{color:var(--muted);font-size:13px}
    .arrow{margin-left:auto;color:var(--muted);font-size:20px;font-weight:900}
    .foot{margin-top:18px;color:var(--muted);font-size:12px;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="mark">DD</div>
      <div>
        <h1>DroneDocking SaaS</h1>
        <div class="sub">1단계(PoC·PoM) 화면 목업 · (주)미래해양</div>
      </div>
    </div>

    <a class="card" href="admin.html">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.6 3-5.6 6.5-5.6s6.5 2 6.5 5.6"/><path d="M16 5.2a3 3 0 0 1 0 5.8"/><path d="M21.5 20c0-2.6-1.6-4.4-4-5"/></svg></span>
      <div><b>관리자 목업</b><span>프로젝트·현장·기준자료, 사용자·권한, 분석 현황, 리포트</span></div>
      <span class="arrow">›</span>
    </a>

    <a class="card" href="worker.html">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="6"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></span>
      <div><b>작업자 목업</b><span>현장 홈, 드론 측량(정합·재촬영 판정), 분석, 리포트</span></div>
      <span class="arrow">›</span>
    </a>

    <a class="card" href="screens.html">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 21h8M12 18v3"/></svg></span>
      <div><b>화면 구성안</b><span>상단 메뉴 구조, 단계적 업로드, 리포트 형식 설명</span></div>
      <span class="arrow">›</span>
    </a>

    <div class="foot">정적 HTML 목업 · 실제 데이터 아님</div>
  </div>
</body>
</html>
